version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scriptsync
      POSTGRES_PASSWORD: scriptsync_dev
      POSTGRES_DB: scriptsync
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://scriptsync:scriptsync_dev@postgres:5432/scriptsync
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres-data:
  redis-data:
